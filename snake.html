<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深海贪吃蛇 | Starry</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{--bg:#060d1a;--bg2:#0c1628;--card:#0d1829;--border:#1a2d4a;--fg:#d8e8f8;--muted:#4a6a8a;--accent:#00e6a0;--accent-dim:rgba(0,230,160,0.12);--accent-glow:rgba(0,230,160,0.35);--food:#ff6b4a;--gold:#ffd700;--danger:#ff4060}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:'Noto Sans SC',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 600px 400px at 25% 15%,rgba(0,100,120,0.08) 0%,transparent 70%),radial-gradient(ellipse 500px 500px at 75% 85%,rgba(0,60,100,0.06) 0%,transparent 70%);pointer-events:none}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(20,40,70,0.18) 1px,transparent 1px),linear-gradient(90deg,rgba(20,40,70,0.18) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.game-container{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:12px;padding:12px}
.top-bar{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:740px;padding:0 4px;flex-wrap:wrap;gap:8px}
.game-title{font-family:'Orbitron',monospace;font-weight:900;font-size:1.35rem;letter-spacing:3px;color:var(--accent);text-shadow:0 0 20px var(--accent-glow)}
.back-link{color:var(--muted);font-size:.8rem;text-decoration:none;display:flex;align-items:center;gap:6px;border:1px solid var(--border);padding:6px 14px;border-radius:6px;transition:all .2s;font-family:'Noto Sans SC',sans-serif}
.back-link:hover{color:var(--accent);border-color:var(--accent)}
.score-group{display:flex;gap:10px;align-items:center}
.score-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px 12px;text-align:center;min-width:72px}
.score-label{font-size:.58rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
.score-value{font-family:'Orbitron',monospace;font-weight:700;font-size:1.1rem;color:var(--fg);transition:transform .15s}
.score-box.current .score-value{color:var(--accent);text-shadow:0 0 10px var(--accent-glow)}
.score-box.combo .score-value{color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,0.3)}
.score-value.bump{transform:scale(1.3)}
.sound-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:.85rem;transition:all .2s}
.sound-btn:hover{border-color:var(--accent);color:var(--accent)}
.sound-btn.off{color:var(--danger)}
.main-area{display:flex;gap:14px;align-items:flex-start}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;box-shadow:0 0 0 1px var(--border),0 0 60px rgba(0,100,120,0.1),0 20px 60px rgba(0,0,0,0.5)}
#gameCanvas{display:block;background:var(--bg2)}
.side-panel{width:190px;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
.panel-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px}
.panel-title{font-family:'Orbitron',monospace;font-weight:700;font-size:.68rem;letter-spacing:1.5px;color:var(--accent);margin-bottom:8px;text-transform:uppercase}
.tut-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.tut-item:last-child{margin-bottom:0}
.tut-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0;margin-top:1px}
.tut-icon.move{background:rgba(0,230,160,0.12);color:var(--accent)}
.tut-icon.boost{background:rgba(255,170,0,0.12);color:#ffaa00}
.tut-icon.pause{background:rgba(74,106,138,0.15);color:var(--muted)}
.tut-icon.fever{background:rgba(255,215,0,0.12);color:var(--gold)}
.tut-icon.evo{background:rgba(100,200,255,0.12);color:#64c8ff}
.tut-icon.rule{background:rgba(255,107,74,0.12);color:var(--food)}
.tut-label{font-size:.75rem;font-weight:600;color:var(--fg);line-height:1.2}
.tut-desc{font-size:.62rem;color:var(--muted);line-height:1.3;margin-top:1px}
.dpad-wrap{display:flex;justify-content:center;padding:2px 0}
.dpad{display:grid;grid-template-columns:44px 44px 44px;grid-template-rows:44px 44px 44px;gap:3px}
.dpad-spacer{width:44px;height:44px}
.dpad-btn{width:44px;height:44px;border:1px solid var(--border);background:var(--card);border-radius:9px;color:var(--fg);font-size:.9rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;-webkit-tap-highlight-color:transparent;user-select:none}
.dpad-btn:hover{border-color:var(--accent);background:var(--accent-dim)}
.dpad-btn:active,.dpad-btn.pressed{background:var(--accent);color:var(--bg);border-color:var(--accent);box-shadow:0 0 10px var(--accent-glow);transform:scale(.93)}
.dpad-center{width:44px;height:44px;border-radius:9px;background:var(--border);display:flex;align-items:center;justify-content:center}
.dpad-center-dot{width:6px;height:6px;border-radius:50%;background:var(--muted)}
.status-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.status-row:last-child{margin-bottom:0}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:all .2s}
.status-dot.on-green{background:var(--accent);box-shadow:0 0 6px var(--accent-glow)}
.status-dot.on-gold{background:var(--gold);box-shadow:0 0 6px rgba(255,215,0,0.4);animation:blink .4s ease-in-out infinite alternate}
.status-dot.on-orange{background:#ffaa00;box-shadow:0 0 6px rgba(255,170,0,0.4);animation:blink .25s ease-in-out infinite alternate}
@keyframes blink{0%{opacity:.5}100%{opacity:1}}
.status-text{font-size:.66rem;color:var(--muted);transition:color .2s;white-space:nowrap}
.status-text.on{color:var(--fg)}
.speed-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.speed-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--food));border-radius:2px;transition:width .3s}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,13,26,0.92);border-radius:14px;z-index:10}
.overlay.hide{display:none}
.overlay-icon{font-size:2.4rem;margin-bottom:12px;color:var(--accent);text-shadow:0 0 30px var(--accent-glow);animation:pulse-icon 2s ease-in-out infinite}
.overlay-icon.dead{color:var(--danger);text-shadow:0 0 30px rgba(255,64,96,0.4);animation:shake .5s ease}
@keyframes pulse-icon{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.08);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.overlay-title{font-family:'Orbitron',monospace;font-weight:900;font-size:1.5rem;letter-spacing:2px;margin-bottom:5px}
.overlay-sub{color:var(--muted);font-size:.82rem;margin-bottom:20px}
.final-score{font-family:'Orbitron',monospace;font-size:2rem;font-weight:900;color:var(--accent);text-shadow:0 0 20px var(--accent-glow);margin-bottom:2px}
.final-label{font-size:.65rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.btn-row{display:flex;gap:8px}
.btn{font-family:'Noto Sans SC',sans-serif;font-weight:600;font-size:.85rem;padding:9px 24px;border:none;border-radius:9px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.btn-primary{background:var(--accent);color:var(--bg);box-shadow:0 0 16px var(--accent-glow),0 4px 12px rgba(0,0,0,0.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 24px var(--accent-glow),0 6px 20px rgba(0,0,0,0.4)}
.btn-secondary{background:transparent;color:var(--fg);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn:active{transform:translateY(0)!important}
@media(max-width:780px){.main-area{flex-direction:column;align-items:center}.side-panel{width:100%;max-width:520px;flex-direction:row;flex-wrap:wrap;gap:8px;justify-content:center}.side-panel .panel-card{flex:1;min-width:150px}.dpad-wrap{order:-1}}
@media(max-width:480px){.game-title{font-size:1rem;letter-spacing:2px}.score-box{min-width:56px;padding:3px 6px}.score-value{font-size:.9rem}.score-label{font-size:.5rem}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="game-container">
<div class="top-bar">
<a href="./" class="back-link"><i class="fa-solid fa-arrow-left"></i> 返回网站</a>
<div class="game-title">DEEP SEA SNAKE</div>
<div class="score-group">
<div class="score-box current"><div class="score-label">分数</div><div class="score-value" id="score">0</div></div>
<div class="score-box combo"><div class="score-label">连击</div><div class="score-value" id="combo">x1</div></div>
<div class="score-box"><div class="score-label">最高</div><div class="score-value" id="best">0</div></div>
<button class="sound-btn" id="soundBtn" title="音效开关"><i class="fa-solid fa-volume-high"></i></button>
</div>
</div>
<div class="main-area">
<div class="canvas-wrap" id="canvasWrap">
<canvas id="gameCanvas"></canvas>
<div class="overlay" id="startOverlay">
<div class="overlay-icon"><i class="fa-solid fa-water"></i></div>
<div class="overlay-title">深海贪吃蛇</div>
<div class="overlay-sub">在深海中进化，成为传说中的海龙</div>
<button class="btn btn-primary" id="startBtn">开始游戏</button>
</div>
<div class="overlay hide" id="endOverlay">
<div class="overlay-icon dead"><i class="fa-solid fa-skull"></i></div>
<div class="overlay-title">游戏结束</div>
<div class="final-score" id="finalScore">0</div>
<div class="final-label">最终得分</div>
<div class="btn-row">
<button class="btn btn-primary" id="restartBtn">再来一局</button>
<button class="btn btn-secondary" id="homeBtn">返回首页</button>
</div>
</div>
</div>
<div class="side-panel">
<div class="panel-card">
<div class="panel-title">操作指南</div>
<div class="tut-item"><div class="tut-icon move"><i class="fa-solid fa-arrows-up-down-left-right"></i></div><div><div class="tut-label">移动</div><div class="tut-desc">方向键 / WASD</div></div></div>
<div class="tut-item"><div class="tut-icon boost"><i class="fa-solid fa-bolt"></i></div><div><div class="tut-label">冲刺加速</div><div class="tut-desc">长按方向键，松开恢复</div></div></div>
<div class="tut-item"><div class="tut-icon pause"><i class="fa-solid fa-pause"></i></div><div><div class="tut-label">暂停</div><div class="tut-desc">按 P 键</div></div></div>
<div class="tut-item"><div class="tut-icon fever"><i class="fa-solid fa-star"></i></div><div><div class="tut-label">惊喜时刻</div><div class="tut-desc">随机大量食物，限时抢吃</div></div></div>
<div class="tut-item"><div class="tut-icon evo"><i class="fa-solid fa-dna"></i></div><div><div class="tut-label">进化</div><div class="tut-desc">吃够数量自动进化变强</div></div></div>
<div class="tut-item"><div class="tut-icon rule"><i class="fa-solid fa-heart-crack"></i></div><div><div class="tut-label">规则</div><div class="tut-desc">撞墙或咬到自己则结束</div></div></div>
</div>
<div class="panel-card dpad-wrap">
<div class="dpad">
<div class="dpad-spacer"></div>
<button class="dpad-btn" data-dir="up" aria-label="上"><i class="fa-solid fa-chevron-up"></i></button>
<div class="dpad-spacer"></div>
<button class="dpad-btn" data-dir="left" aria-label="左"><i class="fa-solid fa-chevron-left"></i></button>
<div class="dpad-center"><div class="dpad-center-dot"></div></div>
<button class="dpad-btn" data-dir="right" aria-label="右"><i class="fa-solid fa-chevron-right"></i></button>
<div class="dpad-spacer"></div>
<button class="dpad-btn" data-dir="down" aria-label="下"><i class="fa-solid fa-chevron-down"></i></button>
<div class="dpad-spacer"></div>
</div>
</div>
<div class="panel-card">
<div class="status-row"><div class="status-dot" id="boostDot"></div><div class="status-text" id="boostText">冲刺：就绪</div></div>
<div class="status-row"><div class="status-dot" id="feverDot"></div><div class="status-text" id="feverText">惊喜：等待中</div></div>
<div class="status-row"><div class="status-dot" id="evoDot"></div><div class="status-text" id="evoText">进化：幼虫</div></div>
<div class="status-row" style="margin-top:4px"><span style="font-size:.6rem;color:var(--muted);min-width:24px">速度</span><div class="speed-track"><div class="speed-fill" id="speedFill"></div></div></div>
</div>
</div>
</div>
</div>
<script>
(function(){
var COLS=26,ROWS=26,CELL=20,INTERVAL_START=210,INTERVAL_MIN=60,INTERVAL_DECAY=0.97,BOOST_FACTOR=0.42,FEVER_DURATION=7000,FEVER_MIN_SCORE=40,FEVER_CHANCE=0.20,FEVER_COOLDOWN=4,COMBO_TIMEOUT=3000,DYING_DURATION=700;
var canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),wrap=document.getElementById('canvasWrap'),scoreEl=document.getElementById('score'),comboEl=document.getElementById('combo'),bestEl=document.getElementById('best'),speedFill=document.getElementById('speedFill'),boostDot=document.getElementById('boostDot'),boostText=document.getElementById('boostText'),feverDot=document.getElementById('feverDot'),feverText=document.getElementById('feverText'),evoDot=document.getElementById('evoDot'),evoText=document.getElementById('evoText'),startOv=document.getElementById('startOverlay'),endOv=document.getElementById('endOverlay'),finalEl=document.getElementById('finalScore'),startBtn=document.getElementById('startBtn'),restartBtn=document.getElementById('restartBtn'),homeBtn=document.getElementById('homeBtn'),soundBtn=document.getElementById('soundBtn');
canvas.width=COLS*CELL;canvas.height=ROWS*CELL;
var audioCtx=null,soundOn=true;
function ensureAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume()}
function playTone(f,ef,d,t,v){if(!audioCtx||!soundOn)return;try{var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type=t||'sine';o.frequency.setValueAtTime(f,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(Math.max(20,ef),audioCtx.currentTime+d);g.gain.setValueAtTime(Math.min(v||.12,.2),audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+d)}catch(e){}}
function sfxE(c){playTone(350+c*60,700+c*80,.12,'sine',.1)}function sfxT(){playTone(500,550,.03,'sine',.02)}function sfxD(){playTone(250,40,.6,'sawtooth',.12)}function sfxF(){[523,659,784].forEach(function(f,i){setTimeout(function(){playTone(f,f*1.02,.4,'sine',.08)},i*60)})}function sfxC(){playTone(800,1200,.2,'triangle',.08)}
soundBtn.addEventListener('click',function(){soundOn=!soundOn;soundBtn.className='sound-btn'+(soundOn?'':' off');soundBtn.innerHTML=soundOn?'<i class="fa-solid fa-volume-high"></i>':'<i class="fa-solid fa-volume-xmark"></i>'});
var snake,dir,nextDir,food,score,best,interval,particles,ambientP,foodPulse,state='idle',lastTick=0,accumulator=0,graceTimer=0,boosting=false,boostKeysDown={},feverMode=false,feverStart=0,feverFoods=[],feverBannerAlpha=0,foodsSinceFever=0,comboCount=1,lastEatTime=0,shakeX=0,shakeY=0,shakeIntensity=0,dyingTime=0,fadingTail=[],prevStage=-1;
best=0;try{best=parseInt(localStorage.getItem('snakeBest2')||'0')||0}catch(e){}bestEl.textContent=best;
var evoStages=[{name:'幼虫',minLen:0,headR:.34,bodyW:.5,headCol:'#66ffaa',bodyCol:'#33cc77',glowCol:'rgba(100,255,170,0.3)',glowR:8,stripe:false,aura:false,horns:false},{name:'青蛇',minLen:6,headR:.37,bodyW:.6,headCol:'#00ffaa',bodyCol:'#00bb77',glowCol:'rgba(0,230,160,0.35)',glowR:12,stripe:false,aura:false,horns:false},{name:'巨蟒',minLen:16,headR:.41,bodyW:.75,headCol:'#00ddcc',bodyCol:'#009988',glowCol:'rgba(0,220,200,0.4)',glowR:18,stripe:true,aura:false,horns:false},{name:'海龙',minLen:31,headR:.44,bodyW:.85,headCol:'#aaffee',bodyCol:'#00ccaa',glowCol:'rgba(170,255,238,0.45)',glowR:26,stripe:true,aura:true,horns:true}];
function getStage(){var l=snake.length;for(var i=evoStages.length-1;i>=0;i--)if(l>=evoStages[i].minLen)return i;return 0}
function updateSpeedBar(){speedFill.style.width=Math.min(100,Math.max(0,(INTERVAL_START-interval)/(INTERVAL_START-INTERVAL_MIN)*100))+'%'}
function updateBoostUI(){if(boosting){boostDot.className='status-dot on-orange';boostText.className='status-text on';boostText.textContent='冲刺：加速中'}else{boostDot.className='status-dot';boostText.className='status-text';boostText.textContent='冲刺：就绪'}}
function updateFeverUI(){if(feverMode){feverDot.className='status-dot on-gold';var r=Math.max(0,Math.ceil((feverStart+FEVER_DURATION-Date.now())/1000));feverText.className='status-text on';feverText.textContent='惊喜：'+r+'s'}else{feverDot.className='status-dot';feverText.className='status-text';feverText.textContent='惊喜：等待中'}}
function updateEvoUI(){var s=getStage(),e=evoStages[s];evoDot.className='status-dot on-green';evoText.className='status-text on';evoText.textContent='进化：'+e.name;evoText.style.color=e.headCol}
function bumpEl(el){el.classList.add('bump');setTimeout(function(){el.classList.remove('bump')},160)}
function init(){var sx=Math.floor(COLS/4),sy=Math.floor(ROWS/2);snake=[{x:sx,y:sy,dx:sx*CELL+CELL/2,dy:sy*CELL+CELL/2},{x:sx-1,y:sy,dx:(sx-1)*CELL+CELL/2,dy:sy*CELL+CELL/2},{x:sx-2,y:sy,dx:(sx-2)*CELL+CELL/2,dy:sy*CELL+CELL/2}];dir={x:1,y:0};nextDir={x:1,y:0};score=0;interval=INTERVAL_START;particles=[];foodPulse=0;graceTimer=500;feverMode=false;feverFoods=[];feverBannerAlpha=0;foodsSinceFever=0;comboCount=1;lastEatTime=0;boosting=false;boostKeysDown={};shakeX=0;shakeY=0;shakeIntensity=0;fadingTail=[];prevStage=-1;scoreEl.textContent='0';comboEl.textContent='x1';updateSpeedBar();updateBoostUI();updateFeverUI();updateEvoUI();placeFood();initAmbient()}
function isOccupied(p){for(var i=0;i<snake.length;i++)if(snake[i].x===p.x&&snake[i].y===p.y)return true;if(food&&food.x===p.x&&food.y===p.y)return true;for(var i=0;i<feverFoods.length;i++)if(feverFoods[i].x===p.x&&feverFoods[i].y===p.y)return true;return false}
function randPos(){var p,t=0;do{p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};t++}while(t<2000&&isOccupied(p));return p}
function placeFood(){food=randPos()}
function tryFever(){if(feverMode||score<FEVER_MIN_SCORE||foodsSinceFever<FEVER_COOLDOWN)return;if(Math.random()>FEVER_CHANCE)return;feverMode=true;feverStart=Date.now();feverBannerAlpha=1.8;feverFoods=[];var c=7+Math.floor(Math.random()*4);for(var i=0;i<c;i++){var p=randPos();p.pulse=Math.random()*6.28;feverFoods.push(p)}food=null;sfxF();updateFeverUI()}

function initAmbient(){ambientP=[];for(var i=0;i<35;i++)ambientP.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,sz:.4+Math.random()*1.8,sp:.08+Math.random()*.25,a:.06+Math.random()*.18,w:Math.random()*6.28})}
